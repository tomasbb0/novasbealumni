name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build static site
        run: npm run build
        env:
          NEXT_PUBLIC_TALLY_RSVP_ID: ${{ vars.NEXT_PUBLIC_TALLY_RSVP_ID }}
          NEXT_PUBLIC_TALLY_SURVEY_ID: ${{ vars.NEXT_PUBLIC_TALLY_SURVEY_ID }}
          NEXT_PUBLIC_WHATSAPP_INVITE_URL: ${{ vars.NEXT_PUBLIC_WHATSAPP_INVITE_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ vars.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
