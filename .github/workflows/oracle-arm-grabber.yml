name: oracle-arm-grabber

# Hunts for free A1.Flex capacity in your Oracle tenancy.
#
# Strategy: instead of one big 4 OCPU + 24 GB instance, we land up to 4x
# small (1 OCPU + 6 GB) instances. Always-Free A1.Flex quota is "4 OCPU +
# 24 GB total across all A1 instances", so 4x small uses the whole quota
# while giving us 4 isolated VMs (one per agent).
#
# Each tick:
#   1. Counts the OCPUs already used by running A1 instances.
#   2. If quota is maxed (>= 4 OCPU), self-disables.
#   3. Otherwise tries to launch a new (1 OCPU + 6 GB) A1 in any AD,
#      named openclaw-1, openclaw-2, ...
#
# Required repo secrets (already set):
#   OCI_TENANCY_OCID
#   OCI_USER_OCID
#   OCI_FINGERPRINT
#   OCI_REGION
#   OCI_PRIVATE_KEY     (raw .pem contents)
#   OCI_SSH_PUBLIC_KEY  (raw ssh-rsa AAAA... line)
#   OCI_SUBNET_OCID     (public subnet you want the VM in)
#
# Optional repo variables (vars, not secrets):
#   OCI_AD                availability domain to target.
#                         valid values look like 'sJBg:EU-TURIN-1-AD-1'.
#                         leave empty to rotate through all ADs.
#   OCI_SHAPE_OCPUS       OCPUs per new instance. defaults to 1.
#   OCI_SHAPE_MEMORY      memory in GB per new instance. defaults to 6.
#   OCI_TARGET_TOTAL_OCPU stop at this many total A1 OCPUs. defaults to 4.
#   OCI_INSTANCE_PREFIX   instance name prefix. defaults to openclaw.

on:
  schedule:
    # Every 10 min. Each run takes ~9 min, so this avoids the queue/cancel
    # collisions we got with */5 (52 cancelled runs in the first 17h).
    - cron: "*/10 * * * *"
  workflow_dispatch:
    inputs:
      ocpus:
        description: "OCPUs to request per instance (1-4)"
        required: false
        default: "1"
      memory:
        description: "Memory in GB per instance (1-24)"
        required: false
        default: "6"

permissions:
  contents: read

concurrency:
  group: oracle-arm-grabber
  cancel-in-progress: false

jobs:
  grab:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Install OCI CLI
        run: |
          curl -fsSL -o install.sh https://raw.githubusercontent.com/oracle/oci-cli/master/scripts/install/install.sh
          sudo bash install.sh --accept-all-defaults --install-dir /opt/oci-cli --exec-dir /usr/local/bin --update-path-and-enable-tab-completion >/dev/null 2>&1
          oci --version

      - name: Write OCI config
        env:
          OCI_USER_OCID: ${{ secrets.OCI_USER_OCID }}
          OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
          OCI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
          OCI_REGION: ${{ secrets.OCI_REGION }}
          OCI_PRIVATE_KEY: ${{ secrets.OCI_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.oci
          chmod 700 ~/.oci
          printf '%s\n' "$OCI_PRIVATE_KEY" > ~/.oci/key.pem
          chmod 600 ~/.oci/key.pem
          cat > ~/.oci/config <<EOF
          [DEFAULT]
          user=$OCI_USER_OCID
          fingerprint=$OCI_FINGERPRINT
          tenancy=$OCI_TENANCY_OCID
          region=$OCI_REGION
          key_file=$HOME/.oci/key.pem
          EOF
          chmod 600 ~/.oci/config

      - name: Check A1 quota usage
        id: precheck
        env:
          OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
          TARGET_TOTAL_OCPU: ${{ vars.OCI_TARGET_TOTAL_OCPU || '4' }}
        run: |
          # List ALL non-terminated A1.Flex instances and sum their OCPUs.
          # We count PROVISIONING/STARTING too so we don't double-launch.
          summary=$(oci compute instance list \
            --compartment-id "$OCI_TENANCY_OCID" \
            --query "data[?contains(\"shape\", 'A1.Flex') && \"lifecycle-state\" != 'TERMINATED' && \"lifecycle-state\" != 'TERMINATING'].{name:\"display-name\", ocpus:\"shape-config\".ocpus, mem:\"shape-config\".\"memory-in-g-bs\", state:\"lifecycle-state\"}" \
            --output json 2>/dev/null || echo "[]")
          echo "Current A1.Flex instances:"
          echo "$summary" | python3 -m json.tool 2>/dev/null || echo "$summary"

          # oci returns "" or "\n" when nothing matches. Normalise to [].
          if ! echo "$summary" | jq -e . >/dev/null 2>&1; then
            summary='[]'
          fi
          used_ocpu=$(echo "$summary" | jq '([.[].ocpus // 0] | add // 0) | floor')
          count=$(echo "$summary" | jq 'length // 0')
          big_count=$(echo "$summary" | jq '[.[] | select((.ocpus // 0) >= 2)] | length')
          small_count=$(echo "$summary" | jq '[.[] | select((.ocpus // 0) < 2)] | length')
          # Belt-and-braces: never let any of these be empty.
          used_ocpu=${used_ocpu:-0}
          count=${count:-0}
          big_count=${big_count:-0}
          small_count=${small_count:-0}
          remaining=$(( TARGET_TOTAL_OCPU - used_ocpu ))
          echo ""
          echo "OCPUs used: $used_ocpu / $TARGET_TOTAL_OCPU"
          echo "OCPUs remaining: $remaining"
          echo "Instance count: $count (small: $small_count, big: $big_count)"
          echo "used_ocpu=$used_ocpu" >> "$GITHUB_OUTPUT"
          echo "remaining_ocpu=$remaining" >> "$GITHUB_OUTPUT"
          echo "instance_count=$count" >> "$GITHUB_OUTPUT"
          echo "big_count=$big_count" >> "$GITHUB_OUTPUT"
          echo "small_count=$small_count" >> "$GITHUB_OUTPUT"

          if [ "$remaining" -le 0 ]; then
            echo "quota_full=true" >> "$GITHUB_OUTPUT"
            echo "✅ A1 quota fully used. Nothing to do."
            {
              echo "## A1 quota full ($used_ocpu / $TARGET_TOTAL_OCPU OCPU)"
              echo ""
              echo "Disable this workflow: https://github.com/${{ github.repository }}/actions/workflows/oracle-arm-grabber.yml"
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "quota_full=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve availability domains
        if: steps.precheck.outputs.quota_full == 'false'
        id: ad
        env:
          OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
          REQUESTED_AD: ${{ vars.OCI_AD }}
        run: |
          ads_json=$(oci iam availability-domain list \
            --compartment-id "$OCI_TENANCY_OCID" \
            --query 'data[*].name' --raw-output)
          echo "ADs available: $ads_json"
          if [ -n "$REQUESTED_AD" ]; then
            ads_list="$REQUESTED_AD"
          else
            ads_list=$(echo "$ads_json" | python3 -c "import sys,json; print(' '.join(json.load(sys.stdin)))")
          fi
          echo "Will rotate through: $ads_list"
          echo "ads=$ads_list" >> "$GITHUB_OUTPUT"

      - name: Resolve latest Ubuntu 24.04 ARM image
        if: steps.precheck.outputs.quota_full == 'false'
        id: image
        env:
          OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
        run: |
          img=$(oci compute image list \
            --compartment-id "$OCI_TENANCY_OCID" \
            --operating-system "Canonical Ubuntu" \
            --operating-system-version "24.04" \
            --shape "VM.Standard.A1.Flex" \
            --sort-by TIMECREATED --sort-order DESC --limit 1 \
            --query 'data[0].id' --raw-output)
          if [ -z "$img" ] || [ "$img" = "null" ]; then
            echo "Could not resolve image OCID" >&2
            exit 1
          fi
          echo "Image: $img"
          echo "id=$img" >> "$GITHUB_OUTPUT"

      - name: Try to launch A1.Flex (in-run loop, multi-AD, multi-instance)
        if: steps.precheck.outputs.quota_full == 'false'
        id: launch
        env:
          OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
          OCI_SUBNET_OCID: ${{ secrets.OCI_SUBNET_OCID }}
          OCI_SSH_PUBLIC_KEY: ${{ secrets.OCI_SSH_PUBLIC_KEY }}
          ADS: ${{ steps.ad.outputs.ads }}
          IMAGE_ID: ${{ steps.image.outputs.id }}
          OCPUS: ${{ github.event.inputs.ocpus || vars.OCI_SHAPE_OCPUS || '1' }}
          MEMORY: ${{ github.event.inputs.memory || vars.OCI_SHAPE_MEMORY || '6' }}
          BIG_OCPUS: ${{ vars.OCI_BIG_OCPUS || '2' }}
          BIG_MEMORY: ${{ vars.OCI_BIG_MEMORY || '12' }}
          SMALL_TARGET: ${{ vars.OCI_SMALL_TARGET || '2' }}
          PREFIX: ${{ vars.OCI_INSTANCE_PREFIX || 'openclaw' }}
          REMAINING_OCPU: ${{ steps.precheck.outputs.remaining_ocpu }}
          INSTANCE_COUNT: ${{ steps.precheck.outputs.instance_count }}
          BIG_COUNT: ${{ steps.precheck.outputs.big_count }}
          SMALL_COUNT: ${{ steps.precheck.outputs.small_count }}
        run: |
          set +e
          # Mix strategy (small first): land SMALL_TARGET small instances
          # (default 2x 1 OCPU + 6 GB) then promote to BIG (2 OCPU + 12 GB)
          # for the last slot. Smaller shapes have higher land rate, so we
          # secure those first.
          if [ "$SMALL_COUNT" -ge "$SMALL_TARGET" ] && [ "$REMAINING_OCPU" -ge "$BIG_OCPUS" ]; then
            echo "Small target reached ($SMALL_COUNT/$SMALL_TARGET). Going big (${BIG_OCPUS}/${BIG_MEMORY})."
            OCPUS="$BIG_OCPUS"
            MEMORY="$BIG_MEMORY"
          else
            echo "Hunting small (${OCPUS}/${MEMORY}). Have $SMALL_COUNT/$SMALL_TARGET."
          fi
          # Cap the requested OCPUs at what's left in the quota for this run.
          if [ "$OCPUS" -gt "$REMAINING_OCPU" ]; then
            echo "Capping requested OCPUs $OCPUS → $REMAINING_OCPU (quota left)"
            OCPUS="$REMAINING_OCPU"
            MEMORY=$(( OCPUS * 6 ))
          fi
          # Pick next sequential name like openclaw-1, openclaw-2, ...
          next_idx=$(( INSTANCE_COUNT + 1 ))
          DISPLAY_NAME="${PREFIX}-${next_idx}"
          echo "Will launch: $DISPLAY_NAME (${OCPUS} OCPU, ${MEMORY} GB)"

          # Loop for ~7 minutes with fast-fire attempts. Drop --wait-for-state
          # so each call returns in ~2-5s instead of ~115s. The Oracle launch
          # API tells us synchronously if capacity is available.
          end_ts=$(( $(date +%s) + 420 ))
          attempt=0
          ad_array=( $ADS )
          landed_ids=""
          while [ "$(date +%s)" -lt "$end_ts" ]; do
            for AD in "${ad_array[@]}"; do
              attempt=$((attempt + 1))
              echo ""
              echo "=== Attempt $attempt | AD: $AD | name: $DISPLAY_NAME | $(date -u +%H:%M:%S) ==="
              out=$(oci compute instance launch \
                --availability-domain "$AD" \
                --compartment-id "$OCI_TENANCY_OCID" \
                --shape "VM.Standard.A1.Flex" \
                --shape-config "{\"ocpus\": $OCPUS, \"memoryInGBs\": $MEMORY}" \
                --image-id "$IMAGE_ID" \
                --subnet-id "$OCI_SUBNET_OCID" \
                --assign-public-ip true \
                --display-name "$DISPLAY_NAME" \
                --metadata "{\"ssh_authorized_keys\": \"$OCI_SSH_PUBLIC_KEY\"}" 2>&1)
              rc=$?
              if [ $rc -eq 0 ] || echo "$out" | grep -q "ocid1.instance."; then
                iid=$(echo "$out" | python3 -c "import sys,re; d=sys.stdin.read(); m=re.search(r'ocid1\.instance\.[A-Za-z0-9._-]+', d); print(m.group(0) if m else '')")
                if [ -n "$iid" ]; then
                  echo ""
                  echo "🎉 LANDED on attempt $attempt in AD $AD"
                  echo "Instance: $iid"
                  echo "Name: $DISPLAY_NAME"
                  if [ -z "$landed_ids" ]; then
                    landed_ids="$iid"
                  else
                    landed_ids="${landed_ids},${iid}"
                  fi
                  # Update accounting and decide whether to keep going.
                  REMAINING_OCPU=$(( REMAINING_OCPU - OCPUS ))
                  INSTANCE_COUNT=$(( INSTANCE_COUNT + 1 ))
                  if [ "$REMAINING_OCPU" -le 0 ]; then
                    echo "Quota fully used. Stopping."
                    break 2
                  fi
                  next_idx=$(( INSTANCE_COUNT + 1 ))
                  DISPLAY_NAME="${PREFIX}-${next_idx}"
                  # Update small/big counters for this run so we know when
                  # to promote to the big shape.
                  if [ "$OCPUS" -lt 2 ]; then
                    SMALL_COUNT=$(( SMALL_COUNT + 1 ))
                  else
                    BIG_COUNT=$(( BIG_COUNT + 1 ))
                  fi
                  # Pick next shape: stay small until target met, then big.
                  if [ "$SMALL_COUNT" -ge "$SMALL_TARGET" ] && [ "$REMAINING_OCPU" -ge "$BIG_OCPUS" ]; then
                    OCPUS="$BIG_OCPUS"; MEMORY="$BIG_MEMORY"
                  else
                    OCPUS=1; MEMORY=6
                  fi
                  if [ "$OCPUS" -gt "$REMAINING_OCPU" ]; then
                    OCPUS="$REMAINING_OCPU"
                    MEMORY=$(( OCPUS * 6 ))
                  fi
                  echo "Continuing: ${REMAINING_OCPU} OCPU left, next instance ${DISPLAY_NAME} (${OCPUS} OCPU, ${MEMORY} GB)"
                  sleep 5
                  continue
                fi
              fi
              if echo "$out" | grep -qiE "Out of (host )?capacity|InternalError"; then
                echo "  → capacity miss"
              elif echo "$out" | grep -qiE "TooManyRequests|Too Many Requests|429"; then
                echo "  → rate limited, longer backoff"
                sleep 30
                continue
              elif echo "$out" | grep -qiE "LimitExceeded|QuotaExceeded"; then
                echo "  → quota exhausted (per Oracle), stopping run"
                echo "$out" >&2
                break 2
              else
                echo "  → unexpected response (logged, continuing):"
                echo "$out" | head -20
              fi
              sleep 5
            done
          done

          echo ""
          if [ -n "$landed_ids" ]; then
            echo "Run finished. Landed: $landed_ids"
            echo "landed=true" >> "$GITHUB_OUTPUT"
            echo "instance_ids=$landed_ids" >> "$GITHUB_OUTPUT"
          else
            echo "Loop ended after $attempt attempts. No capacity this run."
            echo "landed=false" >> "$GITHUB_OUTPUT"
          fi
          exit 0

      - name: Wait for RUNNING and report all A1 instances
        if: steps.launch.outputs.landed == 'true'
        env:
          OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
          INSTANCE_IDS: ${{ steps.launch.outputs.instance_ids }}
        run: |
          set +e
          echo "Waiting for newly-launched instances to reach RUNNING..."
          IFS=',' read -ra ids <<< "$INSTANCE_IDS"
          for iid in "${ids[@]}"; do
            echo "  ⏳ $iid"
            oci compute instance get --instance-id "$iid" \
              --wait-for-state RUNNING --max-wait-seconds 300 >/dev/null 2>&1
          done
          sleep 5

          echo "================================================================"
          echo "  🎉  Landed ${#ids[@]} new A1.Flex instance(s) this run"
          echo "================================================================"

          # Now list ALL running A1 instances (newly landed + pre-existing)
          # so the Step Summary is the canonical view of the fleet.
          all_json=$(oci compute instance list \
            --compartment-id "$OCI_TENANCY_OCID" \
            --lifecycle-state RUNNING \
            --query "data[?contains(\"shape\", 'A1.Flex')].{id:id, name:\"display-name\", ocpus:\"shape-config\".ocpus, mem:\"shape-config\".\"memory-in-g-bs\"}" \
            --output json 2>/dev/null || echo "[]")

          {
            echo "## Oracle A1.Flex fleet status"
            echo ""
            echo "| Name | OCPU | RAM | Public IP | SSH |"
            echo "| --- | --- | --- | --- | --- |"
          } >> "$GITHUB_STEP_SUMMARY"

          total_ocpu=0
          echo "$all_json" | jq -r '.[] | "\(.id)|\(.name)|\(.ocpus)|\(.mem)"' | while IFS='|' read -r iid name ocpus mem; do
            ip=$(oci compute instance list-vnics \
              --instance-id "$iid" \
              --query 'data[0]."public-ip"' --raw-output 2>/dev/null || echo "?")
            echo "  • $name (${ocpus} OCPU, ${mem} GB) → $ip"
            echo "| \`$name\` | $ocpus | ${mem} GB | \`$ip\` | \`ssh ubuntu@$ip\` |" >> "$GITHUB_STEP_SUMMARY"
          done

          {
            echo ""
            echo "Disable this workflow when full: https://github.com/${{ github.repository }}/actions/workflows/oracle-arm-grabber.yml"
          } >> "$GITHUB_STEP_SUMMARY"
